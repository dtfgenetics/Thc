<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1000" viewBox="0 0 720 1000" role="img" aria-labelledby="title desc">
  <title id="title">High Land fallback HIT card artwork</title>
  <desc id="desc">A branded fallback HIT card used when approved card art has not been uploaded yet.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#facc15"/>
      <stop offset="0.48" stop-color="#fb7185"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="glow" cx="35%" cy="20%" r="70%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="720" height="1000" rx="56" fill="#111827"/>
  <rect x="28" y="28" width="664" height="944" rx="44" fill="url(#bg)"/>
  <rect x="28" y="28" width="664" height="944" rx="44" fill="url(#glow)"/>
  <rect x="70" y="76" width="580" height="118" rx="42" fill="#111827" opacity="0.94"/>
  <text x="360" y="153" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="900" fill="#fef3c7" letter-spacing="7">HIT CARD</text>
  <g transform="translate(360 440)">
    <circle r="198" fill="#111827" opacity="0.92"/>
    <circle r="162" fill="none" stroke="#fef3c7" stroke-width="18" opacity="0.9"/>
    <path d="M0 -120 C42 -86 70 -42 70 6 C70 78 28 122 0 150 C-28 122 -70 78 -70 6 C-70 -42 -42 -86 0 -120Z" fill="#22c55e"/>
    <path d="M0 -130 L0 142" stroke="#fef3c7" stroke-width="13" stroke-linecap="round"/>
    <path d="M0 -40 C55 -70 102 -42 124 14" stroke="#fef3c7" stroke-width="12" stroke-linecap="round" fill="none"/>
    <path d="M0 -8 C-58 -40 -104 -16 -128 44" stroke="#fef3c7" stroke-width="12" stroke-linecap="round" fill="none"/>
  </g>
  <text x="360" y="720" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="900" fill="#111827">APPROVED ART</text>
  <text x="360" y="776" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="900" fill="#111827">NEEDED</text>
  <rect x="96" y="830" width="528" height="76" rx="26" fill="#111827" opacity="0.88"/>
  <text x="360" y="879" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="800" fill="#fef3c7">Upload card-001.png through card-030.png</text>
</svg>
