name: DTFSeeds Public Content Cleanup

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Protected environment containing Hostinger access
        required: true
        default: production
        type: choice
        options:
          - staging
          - production
  push:
    branches:
      - main
    paths:
      - site/wordpress/pages/**
      - scripts/apply-wordpress-public-content.sh
      - .github/workflows/wordpress-public-content-cleanup.yml

permissions:
  contents: read
  issues: write

concurrency:
  group: dtfseeds-wordpress-public-content
  cancel-in-progress: false

jobs:
  deploy:
    name: Backup and replace public staging copy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}
    env:
      SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
      SSH_USER: ${{ secrets.HOSTINGER_USER }}
      SSH_PORT: ${{ secrets.HOSTINGER_PORT }}
      SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
      SSH_KNOWN_HOSTS: ${{ secrets.HOSTINGER_KNOWN_HOSTS }}
      WORDPRESS_PATH: ${{ vars.HOSTINGER_WORDPRESS_PATH }}
    steps:
      - name: Check out approved content
        id: checkout
        uses: actions/checkout@v4

      - name: Validate local content package
        id: content
        shell: bash
        run: |
          set -euo pipefail
          bash -n scripts/apply-wordpress-public-content.sh
          for slug in home seeds learn community shop gallery about contact; do
            test -s "site/wordpress/pages/$slug.html"
          done
          ! grep -RFiq "being rebuilt" site/wordpress/pages
          ! grep -RFiq "Reserved strain card" site/wordpress/pages
          ! grep -RFiq "Needed from owner" site/wordpress/pages
          ! grep -RFiq "Tool-ready rebuild" site/wordpress/pages

      - name: Validate protected deployment settings
        id: settings
        shell: bash
        run: |
          set -euo pipefail
          : "${SSH_HOST:?Missing HOSTINGER_HOST}"
          : "${SSH_USER:?Missing HOSTINGER_USER}"
          : "${SSH_PRIVATE_KEY:?Missing HOSTINGER_SSH_PRIVATE_KEY}"
          : "${SSH_KNOWN_HOSTS:?Missing HOSTINGER_KNOWN_HOSTS}"
          : "${WORDPRESS_PATH:?Missing HOSTINGER_WORDPRESS_PATH environment variable}"
          SSH_PORT="${SSH_PORT:-22}"
          [[ "$SSH_PORT" =~ ^[0-9]+$ ]]
          [[ "$WORDPRESS_PATH" =~ ^[A-Za-z0-9_./-]+$ ]]
          [[ "$WORDPRESS_PATH" != *".."* ]]
          [[ "$WORDPRESS_PATH" != "/" ]]

      - name: Configure SSH
        id: ssh_config
        shell: bash
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Upload isolated deployment package
        id: upload
        shell: bash
        run: |
          set -euo pipefail
          SSH_PORT="${SSH_PORT:-22}"
          REMOTE_DIR="/tmp/dtf-public-content-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          printf '%s' "$REMOTE_DIR" > remote-dir.txt
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "mkdir -p '$REMOTE_DIR'"
          tar -czf - site/wordpress/pages scripts/apply-wordpress-public-content.sh | \
            ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "tar -xzf - -C '$REMOTE_DIR'"

      - name: Create backup and apply exact page replacements
        id: apply
        shell: bash
        run: |
          set -euo pipefail
          SSH_PORT="${SSH_PORT:-22}"
          REMOTE_DIR="$(cat remote-dir.txt)"
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "WORDPRESS_PATH='$WORDPRESS_PATH' CONTENT_DIR='$REMOTE_DIR/site/wordpress/pages' BACKUP_ROOT=\"\$HOME/dtfseeds-wordpress-backups\" bash '$REMOTE_DIR/scripts/apply-wordpress-public-content.sh'"

      - name: Remove temporary deployment package
        id: cleanup
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          SSH_PORT="${SSH_PORT:-22}"
          if [[ -f remote-dir.txt ]] && [[ -n "${SSH_HOST:-}" ]] && [[ -n "${SSH_USER:-}" ]]; then
            REMOTE_DIR="$(cat remote-dir.txt)"
            ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "rm -rf '$REMOTE_DIR'" || true
          fi

      - name: Report deployment outcome to issue 46
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const lines = [
              '## Automated WordPress deployment report',
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `Commit: \`${context.sha}\``,
              `Overall job status: **${{ job.status }}**`,
              '',
              '| Stage | Outcome |',
              '|---|---|',
              '| Checkout | ${{ steps.checkout.outcome }} |',
              '| Content validation | ${{ steps.content.outcome }} |',
              '| Protected settings | ${{ steps.settings.outcome }} |',
              '| SSH configuration | ${{ steps.ssh_config.outcome }} |',
              '| Package upload / SSH connection | ${{ steps.upload.outcome }} |',
              '| WordPress backup and page update | ${{ steps.apply.outcome }} |',
              '| Temporary-file cleanup | ${{ steps.cleanup.outcome }} |',
              '',
              'No credential values are included in this report.'
            ];
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 46,
              body: lines.join('\n')
            });

      - name: Record deployment scope
        if: always()
        run: |
          {
            echo "## DTFSeeds public-content cleanup"
            echo
            echo "Production source: main branch."
            echo "Targeted slugs: home, seeds, learn, community, shop, gallery, about, contact."
            echo "The remote script creates a database export and page-level JSON backups before mutation."
            echo "Game directories, plugins, themes, users, products, orders, and media are outside this deployment scope."
          } >> "$GITHUB_STEP_SUMMARY"
