name: High Land CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run High Land unit tests
        run: npm run test

      - name: Build High Land
        run: npm run build

      - name: Install Playwright Chromium
        run: npm --workspace apps/high-land-web exec -- playwright install --with-deps chromium

      - name: Run High Land browser smoke tests
        run: npm run test:e2e

      - name: Lint PHP room API files
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' php_files < <(find apps/high-land-web -type f -name '*.php' -print0)
          if ((${#php_files[@]} == 0)); then
            echo "No PHP files found; lint not applicable."
            exit 0
          fi
          for file in "${php_files[@]}"; do
            php -l "$file"
          done

      - name: Upload High Land build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: high-land-dist
          path: apps/high-land-web/dist
          if-no-files-found: error

      - name: Upload High Land Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: high-land-playwright-artifacts
          path: |
            apps/high-land-web/test-results
            apps/high-land-web/playwright-report
          if-no-files-found: ignore
