name: High Land Server CI

on:
  workflow_dispatch:
  push:
    branches:
      - 'feat/**'
      - 'fix/**'
  pull_request:
    branches:
      - main

jobs:
  server-build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and test multiplayer server
        shell: bash
        run: |
          set -o pipefail
          {
            echo "Node: $(node --version)"
            echo "TypeScript: $(npx tsc --version)"
            node -e "console.log('colyseus:', require('colyseus/package.json').version)"
            node -e "console.log('@colyseus/schema:', require('@colyseus/schema/package.json').version)"
            echo "--- Colyseus setState declarations ---"
            grep -R "setState" node_modules/colyseus node_modules/@colyseus 2>/dev/null | head -40 || true
            echo "--- server verification ---"
            npm run test:server
          } 2>&1 | tee server-test.log

      - name: Upload server verification log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: high-land-server-test-log
          path: server-test.log
          if-no-files-found: error
