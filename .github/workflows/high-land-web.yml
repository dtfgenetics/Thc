name: Web Game CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/high-land-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/high-land-web/package-lock.json

      - name: Install
        run: npm install

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
