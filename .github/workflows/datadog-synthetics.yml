# This workflow triggers Datadog Synthetic tests only when Datadog secrets are configured.
# Without this guard, GitHub Actions fails with:
# "Missing API or APP keys to initialize datadog-ci".

name: Run Datadog Synthetic tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Run Datadog Synthetic tests
    runs-on: ubuntu-latest
    if: ${{ secrets.DD_API_KEY != '' && secrets.DD_APP_KEY != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Run Datadog Synthetic tests
        uses: DataDog/synthetics-ci-github-action@87b505388a22005bb8013481e3f73a367b9a53eb # v1.4.0
        with:
          api_key: ${{ secrets.DD_API_KEY }}
          app_key: ${{ secrets.DD_APP_KEY }}
          test_search_query: 'tag:e2e-tests'

  skipped:
    name: Skip Datadog Synthetic tests
    runs-on: ubuntu-latest
    if: ${{ secrets.DD_API_KEY == '' || secrets.DD_APP_KEY == '' }}

    steps:
      - name: Datadog secrets not configured
        run: |
          echo "Skipping Datadog Synthetic tests because DD_API_KEY and/or DD_APP_KEY are not configured."
          echo "This is not a code compile failure. Add repository secrets to enable Datadog synthetic checks."
