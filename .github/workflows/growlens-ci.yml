name: GrowLens CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'apps/growlens-web/**'
      - 'package.json'
      - '.github/workflows/growlens-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/growlens-web/**'
      - 'package.json'
      - '.github/workflows/growlens-ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run GrowLens unit tests
        run: npm run test:growlens

      - name: Build GrowLens
        id: build
        shell: bash
        run: |
          set -o pipefail
          npm run build:growlens 2>&1 | tee growlens-build.log

      - name: Upload GrowLens build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: growlens-build-diagnostics
          path: growlens-build.log
          if-no-files-found: ignore

      - name: Verify required production files
        shell: bash
        run: |
          set -euo pipefail
          test -f apps/growlens-web/dist/index.html
          test -f apps/growlens-web/dist/manifest.webmanifest
          test -f apps/growlens-web/dist/sw.js
          test -f apps/growlens-web/dist/icon.svg

      - name: Upload GrowLens build artifact
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: growlens-dist
          path: apps/growlens-web/dist
          if-no-files-found: error

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run GrowLens browser smoke tests
        shell: bash
        run: |
          set -o pipefail
          npm run test:e2e:growlens 2>&1 | tee growlens-e2e.log

      - name: Upload GrowLens browser diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: growlens-e2e-diagnostics
          path: growlens-e2e.log
          if-no-files-found: ignore

      - name: Upload GrowLens browser artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: growlens-playwright-artifacts
          path: |
            apps/growlens-web/test-results
            apps/growlens-web/playwright-report
          if-no-files-found: ignore
