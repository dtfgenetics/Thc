name: GrowLens CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'apps/growlens-web/**'
      - 'scripts/growlens-live-acceptance*.mjs'
      - 'package.json'
      - '.github/workflows/growlens-ci.yml'
      - '.github/workflows/growlens-deploy-hostinger.yml'
      - '.github/workflows/growlens-live-acceptance.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/growlens-web/**'
      - 'scripts/growlens-live-acceptance*.mjs'
      - 'package.json'
      - '.github/workflows/growlens-ci.yml'
      - '.github/workflows/growlens-deploy-hostinger.yml'
      - '.github/workflows/growlens-live-acceptance.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint GrowLens PHP API
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' php_files < <(find apps/growlens-web -type f -name '*.php' -print0)
          if ((${#php_files[@]} == 0)); then
            echo "No GrowLens PHP files found."
            exit 1
          fi
          for file in "${php_files[@]}"; do
            php -l "$file"
          done

      - name: Run GrowLens PHP backend smoke test
        run: php apps/growlens-web/tests/php-backend-smoke.php

      - name: Run GrowLens private image storage smoke test
        run: php apps/growlens-web/tests/php-image-storage-smoke.php

      - name: Run GrowLens unit tests
        run: npm run test:growlens

      - name: Test GrowLens live acceptance client without network access
        run: npm run test:growlens:live-client

      - name: Build GrowLens
        id: build
        shell: bash
        run: |
          set -o pipefail
          npm run build:growlens 2>&1 | tee growlens-build.log

      - name: Upload GrowLens build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: growlens-build-diagnostics
          path: growlens-build.log
          if-no-files-found: ignore

      - name: Verify required production files
        shell: bash
        run: |
          set -euo pipefail
          test -f apps/growlens-web/dist/index.html
          test -f apps/growlens-web/dist/manifest.webmanifest
          test -f apps/growlens-web/dist/sw.js
          test -f apps/growlens-web/dist/icon.svg
          test -f apps/growlens-web/dist/api/health.php
          test -f apps/growlens-web/dist/api/register.php
          test -f apps/growlens-web/dist/api/login.php
          test -f apps/growlens-web/dist/api/session.php
          test -f apps/growlens-web/dist/api/sync.php
          test -f apps/growlens-web/dist/api/export.php
          test -f apps/growlens-web/dist/api/logout.php
          test -f apps/growlens-web/dist/api/delete-account.php
          test -f apps/growlens-web/dist/api/upload-image.php
          test -f apps/growlens-web/dist/api/list-images.php
          test -f apps/growlens-web/dist/api/image.php
          test -f apps/growlens-web/dist/api/delete-image.php
          test -f apps/growlens-web/dist/api/_shared.php
          test -f apps/growlens-web/dist/api/_images.php
          test -f apps/growlens-web/dist/api/.htaccess

      - name: Upload GrowLens build artifact
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: growlens-dist
          path: apps/growlens-web/dist
          include-hidden-files: true
          if-no-files-found: error

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run GrowLens browser smoke tests
        shell: bash
        run: |
          set -o pipefail
          npm run test:e2e:growlens 2>&1 | tee growlens-e2e.log

      - name: Upload GrowLens browser diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: growlens-e2e-diagnostics
          path: growlens-e2e.log
          if-no-files-found: ignore

      - name: Upload GrowLens browser artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: growlens-playwright-artifacts
          path: |
            apps/growlens-web/test-results
            apps/growlens-web/playwright-report
          if-no-files-found: ignore
